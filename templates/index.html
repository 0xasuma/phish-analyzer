<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phishing Email Analyzer</title>
<style>
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes wave{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes bubble{0%{transform:translateY(100%) scale(0);opacity:0}30%{opacity:0.6}100%{transform:translateY(-100vh) scale(1);opacity:0}}
@keyframes fade-in{0%{opacity:0;transform:translateY(20px)}100%{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse-ring{0%{transform:scale(0.9);opacity:0.7}100%{transform:scale(1.3);opacity:0}}
@keyframes slide-up{0%{opacity:0;transform:translateY(30px)}100%{opacity:1;transform:translateY(0)}}
*{margin:0;padding:0;box-sizing:border-box}
:root{--blue:#0ea5e9;--blue-light:#38bdf8;--blue-dark:#0284c7;--cyan:#22d3ee;--indigo:#6366f1;--slate-900:#0f172a;--slate-800:#1e293b;--slate-700:#334155;--slate-600:#475569;--glass:rgba(30,41,59,0.6);--glass-border:rgba(148,163,184,0.15);--text:#e2e8f0;--text-dim:#94a3b8;--text-bright:#f1f5f9}
html{font-size:15px}
body{background:linear-gradient(135deg,#0f172a 0%,#1e293b 40%,#0c1929 70%,#0f172a 100%);color:var(--text);font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif;min-height:100vh;overflow-x:hidden;position:relative}
/* Background gradient orbs */
body::before{content:'';position:fixed;top:-30%;right:-20%;width:600px;height:600px;background:radial-gradient(circle,rgba(14,165,233,0.12) 0%,transparent 70%);border-radius:50%;pointer-events:none;z-index:0;animation:float 8s ease-in-out infinite}
body::after{content:'';position:fixed;bottom:-20%;left:-10%;width:500px;height:500px;background:radial-gradient(circle,rgba(99,102,241,0.1) 0%,transparent 70%);border-radius:50%;pointer-events:none;z-index:0;animation:float 10s ease-in-out infinite reverse}
/* Bubble particles */
.bubble{position:fixed;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(14,165,233,0.3),rgba(14,165,233,0.05));border:1px solid rgba(14,165,233,0.15);pointer-events:none;z-index:0;animation:bubble linear infinite}
.container{max-width:960px;margin:0 auto;padding:24px;position:relative;z-index:1}
/* Header */
header{text-align:center;padding:40px 0 30px;animation:fade-in 0.8s ease}
.logo-icon{font-size:3em;margin-bottom:10px;display:block;filter:drop-shadow(0 0 20px rgba(14,165,233,0.4));animation:float 4s ease-in-out infinite}
header h1{font-size:2.4em;font-weight:300;color:var(--text-bright);letter-spacing:-0.5px}
header h1 span{font-weight:700;background:linear-gradient(135deg,var(--blue),var(--cyan),var(--indigo));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:var(--text-dim);margin-top:8px;font-size:0.95em;font-weight:300}
/* Glassmorphism card */
.glass-card{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:16px;padding:28px;margin-top:20px;box-shadow:0 8px 32px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.05);animation:slide-up 0.6s ease;position:relative;overflow:hidden}
.glass-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(14,165,233,0.3),rgba(99,102,241,0.3),transparent)}
/* Input area */
.input-section{animation:slide-up 0.6s ease 0.1s both}
.section-label{color:var(--blue-light);font-size:0.8em;text-transform:uppercase;letter-spacing:2px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.section-label .dot{width:6px;height:6px;border-radius:50%;background:var(--blue);display:inline-block}
textarea{width:100%;background:rgba(15,23,42,0.6);border:1px solid var(--glass-border);color:var(--text);font-family:'SF Mono','Fira Code','Consolas',monospace;font-size:13px;padding:18px;border-radius:12px;resize:vertical;min-height:220px;outline:none;transition:all .3s;line-height:1.7}
textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(14,165,233,0.1),0 0 20px rgba(14,165,233,0.1)}
textarea::placeholder{color:var(--slate-600)}
/* Controls */
.controls{display:flex;gap:12px;margin-top:16px;align-items:center}
button{background:linear-gradient(135deg,var(--blue-dark),var(--blue),var(--cyan));color:#fff;border:none;padding:14px 36px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:all .3s;position:relative;overflow:hidden;letter-spacing:0.3px}
button::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(45deg,transparent 30%,rgba(255,255,255,0.1) 50%,transparent 70%);transform:rotate(45deg);transition:all .5s;opacity:0}
button:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(14,165,233,0.35)}
button:hover::after{opacity:1;animation:shimmer 1.5s ease}
button:active{transform:translateY(0)}
button:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none}
/* Results area */
.results-section{margin-top:20px;animation:slide-up 0.6s ease 0.2s both}
#results{min-height:200px}
/* Score display */
.score-bar{background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--glass-border);border-radius:16px;padding:30px;text-align:center;position:relative;overflow:hidden}
.score-bar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(14,165,233,0.3),transparent)}
.score-circle{width:130px;height:130px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:2.4em;font-weight:700;position:relative;margin-bottom:12px}
.score-circle::before{content:'';position:absolute;inset:-6px;border-radius:50%;border:2px solid transparent;animation:pulse-ring 2s ease-out infinite}
.score-circle.safe{border:3px solid #34d399;color:#34d399;background:rgba(52,211,153,0.08)}
.score-circle.safe::before{border-color:rgba(52,211,153,0.3)}
.score-circle.suspicious{border:3px solid #fbbf24;color:#fbbf24;background:rgba(251,191,36,0.08)}
.score-circle.suspicious::before{border-color:rgba(251,191,36,0.3)}
.score-circle.phishing{border:3px solid #f87171;color:#f87171;background:rgba(248,113,113,0.08)}
.score-circle.phishing::before{border-color:rgba(248,113,113,0.3)}
.verdict{font-size:1.3em;font-weight:600;margin-top:4px;letter-spacing:1px}
/* Content sections */
.section{background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--glass-border);border-radius:14px;padding:22px;margin-bottom:14px;position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s}
.section:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,0.3)}
.section::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(148,163,184,0.1),transparent)}
.section h3{color:var(--blue-light);margin-bottom:14px;font-size:0.95em;font-weight:600;letter-spacing:0.5px}
.flag{background:rgba(248,113,113,0.08);border-left:3px solid #f87171;padding:10px 14px;margin-bottom:8px;border-radius:0 8px 8px 0;font-size:13px;color:var(--text);line-height:1.5;transition:background .2s}
.flag:hover{background:rgba(248,113,113,0.12)}
.url-item{background:rgba(251,191,36,0.06);border-left:3px solid #fbbf24;padding:10px 14px;margin-bottom:8px;border-radius:0 8px 8px 0;font-size:13px;line-height:1.5}
.url-item code{color:var(--cyan);font-family:'SF Mono','Fira Code',monospace;font-size:12px}
.tactic{display:inline-block;background:rgba(99,102,241,0.12);color:#a5b4fc;padding:5px 14px;border-radius:20px;font-size:12px;margin:4px;border:1px solid rgba(99,102,241,0.2);transition:all .2s}
.tactic:hover{background:rgba(99,102,241,0.2);transform:scale(1.05)}
.rec{padding:8px 0;font-size:13px;color:#6ee7b7;border-bottom:1px solid rgba(148,163,184,0.08);line-height:1.5}
.rec:last-child{border:none}
/* Status messages */
.empty{text-align:center;color:var(--slate-600);padding:50px 20px;font-size:1em;font-weight:300}
.loading{text-align:center;padding:30px;font-size:0.95em;color:var(--blue-light)}
.loading .dots::after{content:'';animation:shimmer 1.5s ease infinite}
.error{color:#f87171;background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.2);padding:16px;border-radius:12px;font-size:13px}
/* Wave animation at bottom */
.wave-container{position:fixed;bottom:0;left:0;width:100%;height:80px;overflow:hidden;z-index:0;pointer-events:none}
.wave{position:absolute;bottom:0;left:0;width:200%;height:100%;opacity:0.15}
.wave svg{width:100%;height:100%}
.wave:nth-child(1){animation:wave 8s linear infinite;opacity:0.08}
.wave:nth-child(2){animation:wave 12s linear infinite reverse;opacity:0.05;bottom:5px}
/* Footer */
footer{text-align:center;padding:24px 0;color:var(--slate-600);font-size:0.8em;font-weight:300;letter-spacing:0.5px}
/* Responsive */
@media(max-width:768px){
  header h1{font-size:1.8em}
  .glass-card{padding:20px}
  textarea{min-height:180px}
  .controls{flex-direction:column;align-items:stretch}
  button{width:100%}
  .score-circle{width:100px;height:100px;font-size:1.8em}
}
</style>
</head>
<body>
<!-- Floating bubbles -->
<div class="wave-container">
  <div class="wave"><svg viewBox="0 0 1440 120" preserveAspectRatio="none"><path d="M0,60 C360,120 720,0 1080,60 C1260,90 1350,45 1440,60 L1440,120 L0,120 Z" fill="#0ea5e9"/><path d="M1440,60 C1800,120 2160,0 2520,60 C2700,90 2790,45 2880,60 L2880,120 L1440,120 Z" fill="#0ea5e9"/></svg></div>
  <div class="wave"><svg viewBox="0 0 1440 120" preserveAspectRatio="none"><path d="M0,80 C480,20 960,100 1440,80 L1440,120 L0,120 Z" fill="#6366f1"/><path d="M1440,80 C1920,20 2400,100 2880,80 L2880,120 L1440,120 Z" fill="#6366f1"/></svg></div>
</div>
<div class="container">
<header>
  <span class="logo-icon">🛡️</span>
  <h1>Phishing <span>Email Analyzer</span></h1>
  <p>AI-powered phishing detection — paste email headers & body for instant analysis</p>
</header>
<div class="glass-card">
  <div class="input-section">
    <div class="section-label"><span class="dot"></span> Email Input</div>
    <textarea id="email" placeholder="Paste email header and/or body here...&#10;&#10;Include 'From:', 'To:', 'Subject:', 'Reply-To:' headers for best results.&#10;&#10;The analyzer will examine sender reputation, URL patterns, urgency tactics, and more."></textarea>
    <div class="controls">
      <button id="analyzeBtn" onclick="analyze()">🔍 Analyze Email</button>
    </div>
  </div>
</div>
<div class="results-section">
  <div id="results"><div class="glass-card"><div class="empty">Paste an email above and click Analyze to begin detection</div></div></div>
</div>
<footer>Phishing Email Analyzer — Powered by AI Security Intelligence</footer>
</div>
<script>
// Create floating bubbles
(function(){
  const container=document.body;
  for(let i=0;i<12;i++){
    const b=document.createElement('div');
    b.className='bubble';
    const size=Math.random()*20+6;
    b.style.width=size+'px';
    b.style.height=size+'px';
    b.style.left=Math.random()*100+'%';
    b.style.bottom='-10%';
    b.style.animationDuration=(Math.random()*15+10)+'s';
    b.style.animationDelay=(Math.random()*10)+'s';
    container.appendChild(b);
  }
})();
async function analyze(){
  const email=document.getElementById('email').value.trim();
  if(!email)return;
  const btn=document.getElementById('analyzeBtn');
  const res=document.getElementById('results');
  btn.disabled=true;btn.textContent='⏳ Analyzing...';
  res.innerHTML='<div class="glass-card"><div class="loading">Analyzing email patterns with AI...</div></div>';
  try{
    const r=await fetch('/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});
    const d=await r.json();
    if(d.error){res.innerHTML=`<div class="glass-card"><div class="error">❌ ${d.error}</div></div>`;return;}
    renderResults(d.result);
  }catch(e){res.innerHTML=`<div class="glass-card"><div class="error">❌ ${e.message}</div></div>`;}
  finally{btn.disabled=false;btn.textContent='🔍 Analyze Email';}
}
function renderResults(raw){
  let d;
  try{d=JSON.parse(raw);}catch(e){const m=raw.match(/\{[\s\S]*\}/);if(m){try{d=JSON.parse(m[0]);}catch(e2){document.getElementById('results').innerHTML=`<div class="glass-card"><pre style="white-space:pre-wrap;color:var(--text-dim);font-size:13px;line-height:1.6">${raw}</pre></div>`;return;}}else{document.getElementById('results').innerHTML=`<div class="glass-card"><pre style="white-space:pre-wrap;color:var(--text-dim);font-size:13px;line-height:1.6">${raw}</pre></div>`;return;}}
  const score=d.risk_score||0;
  const verdict=(d.verdict||'UNKNOWN').toLowerCase();
  const cls=verdict==='safe'?'safe':verdict==='suspicious'?'suspicious':'phishing';
  let html=`<div class="score-bar"><div class="score-circle ${cls}">${score}</div><div class="verdict" style="color:${cls==='safe'?'#34d399':cls==='suspicious'?'#fbbf24':'#f87171'}">${d.verdict||'UNKNOWN'}</div></div>`;
  if(d.red_flags&&d.red_flags.length){
    html+=`<div class="section"><h3>🚩 Red Flags (${d.red_flags.length})</h3>`;
    d.red_flags.forEach(f=>{html+=`<div class="flag">${esc(f)}</div>`;});
    html+=`</div>`;
  }
  if(d.suspicious_urls&&d.suspicious_urls.length){
    html+=`<div class="section"><h3>🔗 Suspicious URLs</h3>`;
    d.suspicious_urls.forEach(u=>{html+=`<div class="url-item"><code>${esc(u.url||u)}</code> — ${esc(u.reason||'suspicious')}</div>`;});
    html+=`</div>`;
  }
  if(d.tactics&&d.tactics.length){
    html+=`<div class="section"><h3>🎭 Tactics Detected</h3>`;
    d.tactics.forEach(t=>{html+=`<span class="tactic">${esc(t)}</span>`;});
    html+=`</div>`;
  }
  if(d.summary)html+=`<div class="section"><h3>📝 Analysis</h3><p style="font-size:13px;line-height:1.7;color:var(--text-dim)">${esc(d.summary)}</p></div>`;
  if(d.recommendations&&d.recommendations.length){
    html+=`<div class="section"><h3>💡 Recommendations</h3>`;
    d.recommendations.forEach(r=>{html+=`<div class="rec">• ${esc(r)}</div>`;});
    html+=`</div>`;
  }
  document.getElementById('results').innerHTML=html;
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
</script>
</body>
</html>
