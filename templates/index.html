<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phishing Email Analyzer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e0e0e0;font-family:'Segoe UI',sans-serif;min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:20px}
header{text-align:center;padding:30px 0;border-bottom:1px solid #1a1a2e}
header h1{font-size:2em;color:#ff6b35}
header p{color:#888;margin-top:5px}
textarea{width:100%;background:#0d0d14;border:1px solid #1a1a2e;color:#e0e0e0;font-family:'Fira Code',monospace;font-size:14px;padding:15px;border-radius:8px;resize:vertical;min-height:250px;outline:none;margin-top:20px;transition:border .2s}
textarea:focus{border-color:#ff6b35}
.controls{display:flex;gap:10px;margin-top:15px;align-items:center}
button{background:linear-gradient(135deg,#ff6b35,#ff2d55);color:#fff;border:none;padding:12px 30px;border-radius:6px;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s}
button:hover{opacity:0.85}
button:disabled{opacity:0.5;cursor:not-allowed}
#results{margin-top:20px;min-height:200px}
.score-bar{background:#111122;border-radius:8px;padding:25px;margin-bottom:20px;text-align:center}
.score-circle{width:120px;height:120px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:2em;font-weight:700;margin-bottom:10px}
.score-circle.safe{border:4px solid #00cc66;color:#00cc66}
.score-circle.suspicious{border:4px solid #ffcc00;color:#ffcc00}
.score-circle.phishing{border:4px solid #ff2d55;color:#ff2d55}
.verdict{font-size:1.2em;font-weight:700;margin-top:5px}
.section{background:#0d0d14;border:1px solid #1a1a2e;border-radius:8px;padding:20px;margin-bottom:15px}
.section h3{color:#ff6b35;margin-bottom:10px;font-size:1em}
.flag{background:#1a0a0a;border-left:3px solid #ff2d55;padding:8px 12px;margin-bottom:6px;border-radius:0 4px 4px 0;font-size:13px}
.url-item{background:#0a0a1a;border-left:3px solid #ffcc00;padding:8px 12px;margin-bottom:6px;border-radius:0 4px 4px 0;font-size:13px}
.url-item code{color:#ff6b35}
.tactic{display:inline-block;background:#1a1a2e;color:#ffcc00;padding:4px 10px;border-radius:4px;font-size:13px;margin:3px}
.rec{padding:6px 0;font-size:13px;color:#88cc88;border-bottom:1px solid #1a1a2e}
.rec:last-child{border:none}
.empty{text-align:center;color:#555;padding:40px;font-size:1.1em}
.loading{text-align:center;color:#ff6b35;padding:20px}
.error{color:#ff2d55;background:#1a0a0a;padding:15px;border-radius:6px}
</style>
</head>
<body>
<div class="container">
<header>
<h1>🎣 Phishing Email Analyzer</h1>
<p>AI-powered phishing detection — paste email headers & body for instant analysis</p>
</header>
<textarea id="email" placeholder="Paste email header and/or body here...&#10;&#10;Include 'From:', 'To:', 'Subject:', 'Reply-To:' headers for best results."></textarea>
<div class="controls">
<button id="analyzeBtn" onclick="analyze()">🔍 Analyze Email</button>
</div>
<div id="results"><div class="empty">Paste an email and click Analyze to begin</div></div>
</div>
<script>
async function analyze(){
const email=document.getElementById('email').value.trim();
if(!email)return;
const btn=document.getElementById('analyzeBtn');
const res=document.getElementById('results');
btn.disabled=true;btn.textContent='⏳ Analyzing...';
res.innerHTML='<div class="loading">Analyzing email with AI...</div>';
try{
const r=await fetch('/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});
const d=await r.json();
if(d.error){res.innerHTML=`<div class="error">❌ ${d.error}</div>`;return;}
renderResults(d.result);
}catch(e){res.innerHTML=`<div class="error">❌ ${e.message}</div>`;}
finally{btn.disabled=false;btn.textContent='🔍 Analyze Email';}
}
function renderResults(raw){
let d;
try{d=JSON.parse(raw);}catch(e){const m=raw.match(/\{[\s\S]*\}/);if(m){try{d=JSON.parse(m[0]);}catch(e2){document.getElementById('results').innerHTML=`<pre style="white-space:pre-wrap;color:#aaa">${raw}</pre>`;return;}}else{document.getElementById('results').innerHTML=`<pre style="white-space:pre-wrap;color:#aaa">${raw}</pre>`;return;}}
const score=d.risk_score||0;
const verdict=(d.verdict||'UNKNOWN').toLowerCase();
const cls=verdict==='safe'?'safe':verdict==='suspicious'?'suspicious':'phishing';
let html=`<div class="score-bar"><div class="score-circle ${cls}">${score}</div><div class="verdict" style="color:${cls==='safe'?'#00cc66':cls==='suspicious'?'#ffcc00':'#ff2d55'}">${d.verdict||'UNKNOWN'}</div></div>`;
if(d.red_flags&&d.red_flags.length){
html+=`<div class="section"><h3>🚩 Red Flags (${d.red_flags.length})</h3>`;
d.red_flags.forEach(f=>{html+=`<div class="flag">${esc(f)}</div>`;});
html+=`</div>`;
}
if(d.suspicious_urls&&d.suspicious_urls.length){
html+=`<div class="section"><h3>🔗 Suspicious URLs</h3>`;
d.suspicious_urls.forEach(u=>{html+=`<div class="url-item"><code>${esc(u.url||u)}</code> — ${esc(u.reason||'suspicious')}</div>`;});
html+=`</div>`;
}
if(d.tactics&&d.tactics.length){
html+=`<div class="section"><h3>🎭 Tactics Detected</h3>`;
d.tactics.forEach(t=>{html+=`<span class="tactic">${esc(t)}</span>`;});
html+=`</div>`;
}
if(d.summary)html+=`<div class="section"><h3>📝 Analysis</h3><p style="font-size:14px;line-height:1.6;color:#bbb">${esc(d.summary)}</p></div>`;
if(d.recommendations&&d.recommendations.length){
html+=`<div class="section"><h3>💡 Recommendations</h3>`;
d.recommendations.forEach(r=>{html+=`<div class="rec">• ${esc(r)}</div>`;});
html+=`</div>`;
}
document.getElementById('results').innerHTML=html;
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
</script>
</body>
</html>
